<!DOCTYPE html>
<html>
    <head>
        <title> Car Management </title>
    </head>

    <body>
        <h1 id="cb-title"> Car Management </h1>
        <div>
            <div id="cb-name"> SimulatedDevice </div>
            <div>
                <span> Battery Percentage: </span>
                <span id="cb-battery-percentage"> Not Available </span> 
            </div>
            <div>
                <span> Charging Status: </span> 
                <span  id="cb-charging-status">  Not Available </span> 
            </div>
            <br>
            <div> 
                <span> Device: </span>
                <span  id="cb-online-status">  Not Available </span> 
                <span id="cb-online-status-condition" style="color: red;"></span>
            </div>
            <div>
                <span> Last Connected: </span>
            <span id="cb-last-connection"> Not Available </span>
        </div>
        <div>
        <button id="cb-charge-btn" disabled="true"> Start </button>
        <button id="cb-refresh-btn"> Refresh </button>
        </div>
        <div>
            <div> Schedule Charge: </div>
            <select id="cb-schedule-select-hr"> </select>: 
            <select id="cb-schedule-select-minutes"> </select>
            <select id="cb-schedule-select-interval"></select>
            <span id="cb-schedule-day-text"></span>
            <div>
                <button id="cb-schedule-btn"> Schedule </button>
            </div>
        </div>
        <!-- (TODO) Set Optional Changing time -->

        <script src="script.js"></script>
    </body>
</html>
